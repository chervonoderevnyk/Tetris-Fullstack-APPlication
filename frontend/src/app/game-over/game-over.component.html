<div class="game-over-container">
    <h1>  💀  </h1>
    <h1> ГРУ ЗАКІНЧЕНО! </h1>
    <h2>📈 Досягнуто рівень: {{ finalLevel }}</h2>
    <h2>🏆 Набрано балів: {{ finalScore }}</h2>
    
    <!-- Повідомлення про збереження -->
    <div class="save-status">
      <p *ngIf="saving" class="saving">⏳ Збереження результату...</p>
      <p *ngIf="scoreSaved" class="saved">✅ Результат збережено!</p>
      <p *ngIf="saveError" class="error">❌ {{ saveError }}</p>
    </div>
    
    <div class="button-group">
      <button (click)="restartGame()">🎮 Грати знову</button>
      <button (click)="viewLeaderboard()" class="leaderboard-btn">🏆 Таблиця лідерів</button>
    </div>
</div>
