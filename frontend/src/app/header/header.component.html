<div class="header">
  <div class="score">
    <span>📈 Рівень: {{ level }}</span>
    <span>🏆 Бали: {{ score }}</span>
  </div>
  <div class="title">
    <span>супер-пупер тетріс</span>
  </div>
  <div class="level-avatar">
    <button (click)="goToLeaderboard()" class="action-button leaderboard-button" title="Таблиця лідерів">
      🏆
    </button>
    <span class="user-info">
      <span class="user-name" *ngIf="userName && userName !== ''">{{ userName }}</span>
      <span class="avatar" *ngIf="avatar">{{ avatar }}</span>
    </span>
    <button (click)="logout()" class="action-button logout-button" title="Змінити гравця">
      🚪
    </button>
  </div>
</div>
