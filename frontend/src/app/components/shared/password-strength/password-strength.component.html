<div class="password-strength-container" *ngIf="password">
  <!-- Strength indicator -->
  <div class="strength-indicator">
    <div class="strength-bar">
      <div 
        class="strength-fill"
        [style.width.%]="strengthPercentage"
        [style.background-color]="strengthColor">
      </div>
    </div>
    <span class="strength-text" [style.color]="strengthColor">
      {{ strengthText }}
    </span>
  </div>

  <!-- Local requirements (quick feedback) -->
  <div class="requirements-list">
    <div 
      *ngFor="let requirement of localRequirements" 
      class="requirement"
      [class.met]="requirement.met"
      [class.not-met]="!requirement.met">
      <span class="requirement-icon">
        {{ requirement.met ? '✓' : '✗' }}
      </span>
      <span class="requirement-text">{{ requirement.text }}</span>
    </div>
  </div>

  <!-- Server errors -->
  <div class="errors-list" *ngIf="serverResult && serverResult.errors.length > 0">
    <div *ngFor="let error of serverResult.errors" class="error">
      {{ error }}
    </div>
  </div>

  <!-- Improvement tips -->
  <div class="tips-section" *ngIf="showTips && serverResult && serverResult.tips.length > 0">
    <button class="tips-toggle" (click)="toggleTips()">
      {{ tipsExpanded ? 'Hide tips' : 'Show improvement tips' }}
    </button>
    <div class="tips-list" *ngIf="tipsExpanded">
      <div *ngFor="let tip of serverResult.tips" class="tip">
        💡 {{ tip }}
      </div>
    </div>
  </div>

  <!-- Password generator -->
  <div class="password-generator" *ngIf="showGenerator">
    <button class="generate-btn" (click)="generatePassword()">
      🎲 Generate secure password
    </button>
    <div class="generated-password" *ngIf="generatedPassword">
      <input 
        type="text" 
        [value]="generatedPassword" 
        readonly 
        class="generated-input"
        #generatedInput>
      <button class="copy-btn" (click)="copyPassword(generatedInput)">
        Copy
      </button>
      <button class="use-btn" (click)="useGeneratedPassword()">
        Use
      </button>
    </div>
  </div>
</div>
