<div class="game-over-container">
    <h1>  💀  </h1>
    <h1> GAME OVER! </h1>
    <h2>📈 Level reached: {{ finalLevel }}</h2>
    <h2>🏆 Score: {{ finalScore }}</h2>
    
    <!-- Score saving notification -->
    <div class="save-status">
      <p *ngIf="saving" class="saving">⏳ Saving score...</p>
      <p *ngIf="scoreSaved" class="saved">✅ Score saved!</p>
      <p *ngIf="saveError" class="error">❌ {{ saveError }}</p>
    </div>
    
    <div class="button-group">
      <button (click)="restartGame()">🎮 Play again</button>
      <button (click)="viewLeaderboard()" class="leaderboard-btn">🏆 Leaderboard</button>
    </div>
</div>
